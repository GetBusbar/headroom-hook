# Build the headroom-hook image for amd64 + arm64 and publish to Docker Hub,
# tagged with the pushed vX.Y.Z tag and `latest`. Binaries are built on
# NATIVE runners (no QEMU) then copied into a small distroless/cc image.
#
# NOTE (see Dockerfile): on Linux, headroom-core's default tree links the ONNX
# runtime at build time. The FIRST run of this workflow is the validation point
# for the runtime linkage — if the binary needs libonnxruntime.so at run time,
# bump FROM in the Dockerfile to a base that carries it (or, better, land the
# upstream `ml`-feature gate so the lexical build drops ONNX entirely and this
# can move to a static musl binary on FROM scratch).
name: docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

env:
  DOCKERHUB_IMAGE: getbusbar/headroom-hook

jobs:
  # Per-arch binaries on native runners (arm64 built on arm64 — no emulation).
  build-binaries:
    name: build ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build (release)
        run: |
          cargo build --release --locked --target ${{ matrix.target }}
          BIN="target/${{ matrix.target }}/release/headroom-hook"
          file "$BIN"
          # Reveal the runtime linkage — this is the validation point for the
          # image base: if `ldd` lists libonnxruntime.so, distroless/cc needs it
          # added (or land the upstream `ml`-feature gate to drop ONNX entirely).
          echo "== ldd =="; ldd "$BIN" || true
          if ldd "$BIN" 2>/dev/null | grep -qi 'onnxruntime'; then
            echo "::warning::binary links libonnxruntime.so at runtime — distroless/cc base must provide it"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: headroom-hook-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/headroom-hook
          if-no-files-found: error

  publish:
    name: build & push image
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage binaries into build context
        uses: actions/download-artifact@v4
        with:
          pattern: headroom-hook-*
          path: staged
      - name: Arrange per-arch layout
        run: |
          mkdir -p binaries/amd64 binaries/arm64
          mv staged/headroom-hook-amd64/headroom-hook binaries/amd64/headroom-hook
          mv staged/headroom-hook-arm64/headroom-hook binaries/arm64/headroom-hook
          chmod +x binaries/amd64/headroom-hook binaries/arm64/headroom-hook

      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve version
        id: ver
        run: |
          VER=""
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then VER="${GITHUB_REF_NAME#v}"; fi
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
          # tag build -> X.Y.Z + latest; bare dispatch -> `test`.
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.ver.outputs.ver }},enable=${{ steps.ver.outputs.ver != '' }}
            type=raw,value=latest,enable=${{ steps.ver.outputs.ver != '' }}
            type=raw,value=test,enable=${{ steps.ver.outputs.ver == '' }}
          labels: |
            org.opencontainers.image.title=headroom-hook
            org.opencontainers.image.description=Context-compression rewrite gate for busbar (headroom-core BM25 TextCrusher).
            org.opencontainers.image.url=https://getbusbar.com/hooks/headroom
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
