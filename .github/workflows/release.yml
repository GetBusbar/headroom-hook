# Build the headroom-hook binary for each supported platform and publish them as
# assets on a GitHub Release, so users can `curl` a prebuilt binary instead of
# building from source. Triggered by pushing a tag like `headroom-v1.0.0`.
name: release-headroom

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}   # allow a manual run (builds, uploads to a draft/no release)

permissions:
  contents: write   # create the release + upload assets

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: headroom-hook-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: headroom-hook-linux-aarch64
          - os: macos-14
            target: aarch64-apple-darwin
            asset: headroom-hook-macos-arm64
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build (release)
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Stage binary
        run: |
          install -m 0755 "target/${{ matrix.target }}/release/headroom-hook" "${{ matrix.asset }}"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: |
          cd dist
          sha256sum headroom-hook-* > SHA256SUMS
          cat SHA256SUMS
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/headroom-hook-*
            dist/SHA256SUMS
          body: |
            Prebuilt `headroom-hook` binaries for busbar's context-compression gate.

            Grab the one for your platform and run it (it owns a Unix socket; busbar connects to it):

            ```sh
            # Linux x86_64 example — swap the asset name for your platform:
            curl -fsSL -o headroom-hook \
              https://github.com/GetBusbar/headroom-hook/releases/download/${{ github.ref_name }}/headroom-hook-linux-x86_64
            chmod +x headroom-hook
            HEADROOM_SOCKET=/tmp/headroom.sock ./headroom-hook
            ```

            Verify with `sha256sum -c SHA256SUMS`. Assets:
            `headroom-hook-linux-x86_64`, `headroom-hook-linux-aarch64`,
            `headroom-hook-macos-arm64`.

            (Intel macOS: build from source — see the README. Apple Silicon is prebuilt.)
