# Hook phase: identical to config.baseline.yaml PLUS the Headroom gate, registered
# exactly as the README recommends (global rewrite gate, prompt: rw, 25ms deadline,
# fail-open). The hook container creates the socket in the shared /run/busbar volume.
listen: "0.0.0.0:8080"
auth: { chain: [tokens], client_tokens: ["bench-token"] }
providers: { mock: { api_key_env: BENCH_MOCK_KEY } }
models: { bench-model: { provider: mock, max_concurrent: 256, max_requests: -1 } }
pools: { bench-pool: { members: [ { target: bench-model } ] } }
hooks:
  headroom:
    kind: gate
    socket: /run/busbar/headroom.sock
    prompt: rw
    global: true
    timeout_ms: 25
    on_error: nothing
    settings: { target_ratio: 0.5, min_savings_pct: 10 }
observability: { emit_server_timing: true }
