# Baseline: busbar alone, no hook. Server-Timing on so the driver reads busbar;dur.
listen: "0.0.0.0:8080"
auth: { chain: [tokens], client_tokens: ["bench-token"] }
providers: { mock: { api_key_env: BENCH_MOCK_KEY } }
models: { bench-model: { provider: mock, max_concurrent: 256, max_requests: -1 } }
pools: { bench-pool: { members: [ { target: bench-model } ] } }
observability: { emit_server_timing: true }
