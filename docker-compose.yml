# busbar + headroom-hook, composed — the "just works" setup.
#
#   docker compose up
#
# Two tiny images, two processes, one shared Unix socket. The hook owns the
# socket; busbar connects to it. You own both lifecycles — busbar lazy-connects
# and reconnects across restarts, so start order doesn't matter.
#
# Copy-paste to run it (grabs this file + a starter busbar config):
#
#     curl -fsSL -O https://raw.githubusercontent.com/GetBusbar/headroom-hook/main/docker-compose.yml
#     curl -fsSL -o config.yaml https://raw.githubusercontent.com/GetBusbar/headroom-hook/main/config.example.yaml
#     export ANTHROPIC_KEY=sk-ant-...    # or edit config.yaml for your provider
#     docker compose up
#
# busbar (:8080) + the compression hook come up together; the starter config
# registers Headroom globally, so every request across all six protocols busbar
# speaks is compressed. Edit config.yaml to point at your own pools/providers.

services:
  headroom:
    image: getbusbar/headroom-hook
    restart: unless-stopped
    volumes:
      - sock:/run/busbar          # the hook creates /run/busbar/headroom.sock here
    # HEADROOM_SOCKET defaults to /run/busbar/headroom.sock in the image.

  busbar:
    image: getbusbar/busbar
    restart: unless-stopped
    depends_on: [headroom]
    ports:
      - "8080:8080"
    volumes:
      - sock:/run/busbar          # busbar sees the same socket file
      - ./config.yaml:/etc/busbar/config.yaml:ro
    environment:
      # The starter config.yaml routes to Anthropic — export your key before
      # `docker compose up` (or swap the provider in config.yaml). busbar reads
      # the key from this env var; it never leaves your host.
      - ANTHROPIC_KEY

volumes:
  sock: {}                        # a small shared volume, just for the socket
